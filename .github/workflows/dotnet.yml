name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore V1/ZolsConsoleExpenseTracker.csproj

    - name: Build solution
      run: dotnet build V1/ZolsConsoleExpenseTracker.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test V1/ExpenseInterface.Tests/ExpenseInterface.Tests.csproj --verbosity normal

    - name: Publish application
      run: dotnet publish V1/ZolsConsoleExpenseTracker.csproj -c Release -o publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ExpenseTracker-Build
        path: publish/